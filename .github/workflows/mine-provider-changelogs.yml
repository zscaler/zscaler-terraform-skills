name: Mine Provider Changelogs

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mine changelogs
        run: python scripts/changelog/mine.py --top 10

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(changelog): refresh recent-provider-changes from upstream"
          title: "chore(changelog): refresh recent-provider-changes from upstream"
          body: |
            Automated refresh of `skills/*/references/recent-provider-changes.md` from the
            upstream provider `CHANGELOG.md` files.

            Generated by `.github/workflows/mine-provider-changelogs.yml`.
          branch: chore/refresh-provider-changelogs
          delete-branch: true
          add-paths: |
            skills/*/references/recent-provider-changes.md
